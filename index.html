<body>
    <div class="card">
        <h1>DateTime Ticks Converter</h1>

        <section>
            <h2 id="converterHeading">DateTime ↔ Ticks 변환</h2>
            <div class="row">
                <div class="field">
                    <label id="labelDt" for="dtInput">DateTime</label>
                    <input type="datetime-local" id="dtInput">
                </div>
                <div class="field">
                    <label id="labelTick" for="tickInput">.NET Ticks</label>
                    <input type="number" id="tickInput" placeholder="Ticks 값 입력">
                </div>
            </div>
            <p id="note">한쪽 필드에 값을 입력하면 다른 필드가 자동으로 업데이트됩니다.</p>
        </section>

        <section class="info">
            <h2 id="infoHeading">.NET Ticks란?</h2>
            <p id="infoP1">.NET Ticks는 0001년 1월 1일 자정(UTC)부터 경과한 시간을 100나노초 단위로 표현한 값입니다. 1초는 10,000,000 Ticks에 해당합니다.</p>
            <p id="infoP2">주로 C#, .NET 환경의 <code>DateTime.Ticks</code> 속성에서 사용되며, 고정밀 시간 측정이나 로그 분석, 데이터베이스 타임스탬프 비교 등에 활용됩니다.</p>
        </section>
    </div>

    <button id="themeToggle" type="button">🌙 다크모드</button>

    <script>
        const THEME_KEY = 'theme';

        const LANGS = {
            ko: {
                converterHeading: 'DateTime ↔ Ticks 변환',
                labelDt: 'DateTime',
                labelTick: '.NET Ticks',
                ticksPlaceholder: 'Ticks 값 입력',
                note: '한쪽 필드에 값을 입력하면 다른 필드가 자동으로 업데이트됩니다.',
                infoHeading: '.NET Ticks란?',
                infoP1: '.NET Ticks는 0001년 1월 1일 자정(UTC)부터 경과한 시간을 100나노초 단위로 표현한 값입니다. 1초는 10,000,000 Ticks에 해당합니다.',
                infoP2: '주로 C#, .NET 환경의 <code>DateTime.Ticks</code> 속성에서 사용되며, 고정밀 시간 측정이나 로그 분석, 데이터베이스 타임스탬프 비교 등에 활용됩니다.',
                darkMode: '🌙 다크모드',
                lightMode: '🔆 라이트모드',
            },
            en: {
                converterHeading: 'DateTime ↔ Ticks Conversion',
                labelDt: 'DateTime',
                labelTick: '.NET Ticks',
                ticksPlaceholder: 'Enter Ticks value',
                note: 'Enter a value in one field and the other will update automatically.',
                infoHeading: 'What is .NET Ticks?',
                infoP1: '.NET Ticks represent the number of 100-nanosecond intervals elapsed since January 1, 0001 at midnight (UTC). One second equals 10,000,000 Ticks.',
                infoP2: 'Commonly used with the <code>DateTime.Ticks</code> property in C# and .NET, Ticks are useful for high-precision time measurement, log analysis, and database timestamp comparison.',
                darkMode: '🌙 Dark mode',
                lightMode: '🔆 Light mode',
            },
            ja: {
                converterHeading: 'DateTime ↔ Ticks 変換',
                labelDt: 'DateTime',
                labelTick: '.NET Ticks',
                ticksPlaceholder: 'Ticks 値を入力',
                note: 'どちらかのフィールドに値を入力すると、もう一方が自動的に更新されます。',
                infoHeading: '.NET Ticksとは？',
                infoP1: '.NET Ticksは、0001年1月1日の深夜(UTC)からの経過時間を100ナノ秒単位で表した値です。1秒は10,000,000 Ticksに相当します。',
                infoP2: 'C#や.NET環境の<code>DateTime.Ticks</code>プロパティで主に使用され、高精度な時間計測、ログ分析、データベースのタイムスタンプ比較などに活用されます。',
                darkMode: '🌙 ダークモード',
                lightMode: '🔆 ライトモード',
            },
        };

        let currentLang = 'ko';

        function detectLang() {
            const lang = (navigator.language || navigator.userLanguage || 'ko').toLowerCase();
            if (lang.startsWith('ko')) return 'ko';
            if (lang.startsWith('ja')) return 'ja';
            return 'en';
        }

        function applyI18n(lang) {
            const t = LANGS[lang] || LANGS.ko;
            currentLang = lang;
            document.documentElement.lang = lang;
            document.getElementById('converterHeading').textContent = t.converterHeading;
            document.getElementById('labelDt').textContent = t.labelDt;
            document.getElementById('labelTick').textContent = t.labelTick;
            document.getElementById('tickInput').placeholder = t.ticksPlaceholder;
            document.getElementById('note').textContent = t.note;
            document.getElementById('infoHeading').textContent = t.infoHeading;
            document.getElementById('infoP1').textContent = t.infoP1;
            document.getElementById('infoP2').innerHTML = t.infoP2;
        }

        function getInitialTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark' || saved === 'light') return saved;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem(THEME_KEY, theme);
            const t = LANGS[currentLang] || LANGS.ko;
            document.getElementById('themeToggle').textContent = isDark ? t.lightMode : t.darkMode;
        }

        const dtInput = document.getElementById('dtInput');
        const tickInput = document.getElementById('tickInput');
        const themeToggle = document.getElementById('themeToggle');

        themeToggle.addEventListener('click', () => {
            const nowDark = document.documentElement.classList.contains('dark');
            applyTheme(nowDark ? 'light' : 'dark');
        });

        // .NET Ticks 시작점(0001-01-01)과 Unix Epoch(1970-01-01)의 차이 (Ticks 단위)
        const TICKS_AT_EPOCH = 621355968000000000n;
        const TICKS_PER_MILLISECOND = 10000n;
        let updating = false;

        dtInput.addEventListener('input', () => {
            if (updating) return;
            const val = dtInput.value;
            if (!val) {
                tickInput.value = '';
                return;
            }

            const date = new Date(val);
            if (isNaN(date.getTime())) {
                tickInput.value = '';
                return;
            }

            const unixMs = BigInt(date.getTime());
            const ticks = unixMs * TICKS_PER_MILLISECOND + TICKS_AT_EPOCH;
            updating = true;
            tickInput.value = ticks.toString();
            updating = false;
        });

        tickInput.addEventListener('input', () => {
            if (updating) return;
            const s = tickInput.value;
            if (!s) {
                dtInput.value = '';
                return;
            }

            try {
                const ticks = BigInt(s);
                const unixMs = Number((ticks - TICKS_AT_EPOCH) / TICKS_PER_MILLISECOND);
                const date = new Date(unixMs);
                if (isNaN(date.getTime())) {
                    dtInput.value = '';
                    return;
                }

                const local = date.toISOString().substring(0, 16);
                updating = true;
                dtInput.value = local;
            } catch (_e) {
                dtInput.value = '';
            }
            updating = false;
        });

        function setCurrentDatetime() {
            const local = new Date().toISOString().substring(0, 16);
            dtInput.value = local;
            dtInput.dispatchEvent(new Event('input'));
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyI18n(detectLang());
            applyTheme(getInitialTheme());
            setCurrentDatetime();
        });
    </script>
