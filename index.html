<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datetime ↔ Ticks Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-2xl w-full">
        <h1 class="text-2xl font-bold text-center mb-8 text-blue-600">Datetime ↔ Ticks Converter</h1>

        <div class="mb-10">
            <h2 class="text-lg font-semibold mb-3">↔️ Datetime & Ticks Converter</h2>
            <div class="flex gap-2">
                <input type="datetime-local" id="dtInput" class="flex-1 p-2 border rounded shadow-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="Datetime 입력">
                <input type="number" id="tickInput" placeholder="Ticks 입력" class="flex-1 p-2 border rounded shadow-sm focus:ring-2 focus:ring-green-400 outline-none">
            </div>
            <p id="note" class="mt-3 text-sm text-gray-600">Enter a value in one field and the other will update automatically.<br>하나의 값을 입력하면 다른 필드가 자동으로 변환됩니다.</p>
        </div>
    </div>

    <script>
        // .NET Ticks 시작일 (0001-01-01)과 Unix Epoch (1970-01-01) 사이의 차이 (Ticks 단위)
        const TICKS_AT_EPOCH = 621355968000000000n;
        const TICKS_PER_MILLISECOND = 10000n;

        const dtInput = document.getElementById('dtInput');
        const tickInput = document.getElementById('tickInput');
        let updating = false; // 재귀 업데이트 방지

        dtInput.addEventListener('input', () => {
            if (updating) return;
            const val = dtInput.value;
            if (!val) {
                tickInput.value = '';
                return;
            }
            const date = new Date(val);
            if (isNaN(date.getTime())) {
                tickInput.value = '';
                return;
            }
            const unixMs = BigInt(date.getTime());
            const ticks = (unixMs * TICKS_PER_MILLISECOND) + TICKS_AT_EPOCH;
            updating = true;
            tickInput.value = ticks.toString();
            updating = false;
        });

        tickInput.addEventListener('input', () => {
            if (updating) return;
            const s = tickInput.value;
            if (!s) {
                dtInput.value = '';
                return;
            }
            try {
                const ticks = BigInt(s);
                const unixMs = Number((ticks - TICKS_AT_EPOCH) / TICKS_PER_MILLISECOND);
                const date = new Date(unixMs);
                if (isNaN(date.getTime())) {
                    dtInput.value = '';
                    return;
                }
                const iso = date.toISOString();
                const local = iso.substring(0,16); // yyyy-MM-ddTHH:mm
                updating = true;
                dtInput.value = local;
            } catch (e) {
                // invalid number, clear
                dtInput.value = '';
            }
            updating = false;
        });

        // 페이지가 로드될 때 현재 시각을 datetime-local 기본값으로 설정
        function setCurrentDatetime() {
            const now = new Date();
            const iso = now.toISOString();
            const local = iso.substring(0,16);
            dtInput.value = local;
            // 초기값 반영을 위해 이벤트 트리거
            const event = new Event('input');
            dtInput.dispatchEvent(event);
        }

        window.addEventListener('DOMContentLoaded', setCurrentDatetime);
    </script>
</body>
</html>
