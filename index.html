<body>
    <div class="card">
        <h1>Datetime - Ticks Converter</h1>

        <section>
            <h2>Datetime & Ticks Converter</h2>
            <div class="row">
                <input type="datetime-local" id="dtInput" placeholder="Datetime 입력">
                <input type="number" id="tickInput" placeholder="Ticks 입력">
            </div>
            <p id="note">한쪽 필드에 값을 입력하면 다른 필드가 자동으로 업데이트됩니다.<br>Enter a value in one field and the other will update automatically.</p>

    <button id="themeToggle" type="button">Dark mode</button>

    <script>
        const THEME_KEY = 'theme';

        function getInitialTheme() {
            const saved = localStorage.getItem(THEME_KEY);
            if (saved === 'dark' || saved === 'light') return saved;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            const isDark = theme === 'dark';
            document.documentElement.classList.toggle('dark', isDark);
            localStorage.setItem(THEME_KEY, theme);
            document.getElementById('themeToggle').textContent = isDark ? 'Light mode' : 'Dark mode';
        }

        const dtInput = document.getElementById('dtInput');
        const tickInput = document.getElementById('tickInput');
        const themeToggle = document.getElementById('themeToggle');

        themeToggle.addEventListener('click', () => {
            const nowDark = document.documentElement.classList.contains('dark');
            applyTheme(nowDark ? 'light' : 'dark');
        });

        // .NET Ticks 시작점(0001-01-01)과 Unix Epoch(1970-01-01)의 차이 (Ticks 단위)
        const TICKS_AT_EPOCH = 621355968000000000n;
        const TICKS_PER_MILLISECOND = 10000n;
        let updating = false;

        dtInput.addEventListener('input', () => {
            if (updating) return;
            const val = dtInput.value;
            if (!val) {
                tickInput.value = '';
                return;
            }

            const date = new Date(val);
            if (isNaN(date.getTime())) {
                tickInput.value = '';
                return;
            }

            const unixMs = BigInt(date.getTime());
            const ticks = unixMs * TICKS_PER_MILLISECOND + TICKS_AT_EPOCH;
            updating = true;
            tickInput.value = ticks.toString();
            updating = false;
        });

        tickInput.addEventListener('input', () => {
            if (updating) return;
            const s = tickInput.value;
            if (!s) {
                dtInput.value = '';
                return;
            }

            try {
                const ticks = BigInt(s);
                const unixMs = Number((ticks - TICKS_AT_EPOCH) / TICKS_PER_MILLISECOND);
                const date = new Date(unixMs);
                if (isNaN(date.getTime())) {
                    dtInput.value = '';
                    return;
                }

                const local = date.toISOString().substring(0, 16);
                updating = true;
                dtInput.value = local;
            } catch (_e) {
                dtInput.value = '';
            }
            updating = false;
        });

        function setCurrentDatetime() {
            const local = new Date().toISOString().substring(0, 16);
            dtInput.value = local;
            dtInput.dispatchEvent(new Event('input'));
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyTheme(getInitialTheme());
            setCurrentDatetime();
        });
    </script>
